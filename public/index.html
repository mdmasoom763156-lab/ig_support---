<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Main Login Box -->
        <div class="login-box">
            <!-- Instagram Logo -->
            <div class="logo">
                <i class="fab fa-instagram"></i>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="Username, email or mobile number" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Log in</button>
            </form>

            <!-- Error Message -->
            <div id="loginError" class="error-msg" style="display:none;"></div>

            <!-- Divider -->
            <div class="divider">
                <span>OR</span>
            </div>

            <!-- Facebook Login -->
            <div class="fb-login">
                <i class="fab fa-facebook-square"></i> Log in with Facebook
            </div>

            <!-- Forgot Password -->
            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>
        </div>

        <!-- Signup Box -->
        <div class="signup-box">
            Don't have an account? <a href="#" id="showSignup">Create new account</a>
        </div>

        <!-- Meta Footer -->
        <div class="meta-footer">
            Meta
        </div>
    </div>

    <!-- Signup Modal (Popup) -->
    <div id="signupModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Create new account</h2>
            <form id="signupForm">
                <input type="text" id="signupFullName" placeholder="Full name" required>
                <input type="text" id="signupUsername" placeholder="Username" required>
                <input type="email" id="signupEmail" placeholder="Email" required>
                <input type="password" id="signupPassword" placeholder="Password" required>
                <button type="submit">Sign up</button>
            </form>
            <div id="signupMsg" class="success-msg" style="display:none;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
